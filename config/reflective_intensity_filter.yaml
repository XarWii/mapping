# Livox CustomMsg filter. It preserves complete selected CustomPoint records,
# including offset_time required by the dynamic deskew stage.
reflective_intensity_filter:
  input_topic: "/livox/lidar"
  output_topic: "/reflective/high_reflect_points"
  reflectivity_threshold: 160
  queue_size: 1
  # PointCloud2 is for RViz only; the mapper must consume output_topic above.
  publish_visualization: true
  visualization_topic: "/reflective/high_reflect_points_visualization"
